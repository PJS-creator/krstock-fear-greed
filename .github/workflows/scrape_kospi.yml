name: dcinside-kospi-backtest-scraper

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: "YYYY-MM-DD (비우면 date.txt 전체 날짜 실행)"
        required: false
        default: ""
      start_time:
        description: "HH:MM (KST)"
        required: false
        default: "08:50"
      end_time:
        description: "HH:MM (KST)"
        required: false
        default: "15:40"

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Run scraper (kospi)
        env:
          BOARD_ID: "kospi"
          OUT_DIR: "outputs_kospi"
          OUT_PREFIX: "kospi"

          TARGET_DATE: ${{ inputs.target_date }}
          START_TIME: ${{ inputs.start_time }}
          END_TIME: ${{ inputs.end_time }}

          LIST_NUM: "100"
          SLEEP_LIST: "0.9"
          SLEEP_POST: "0.6"
          MAX_RETRIES: "5"

          # 디버그 로그 보고 싶으면 1
          DEBUG: "1"

        run: |
          python main.py
          ls -al outputs_kospi || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kospi_csv_outputs
          path: outputs_kospi/
