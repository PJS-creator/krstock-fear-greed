name: dcinside-krstock-backtest-scraper

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: "YYYY-MM-DD (비우면 date.txt 전체 날짜 실행)"
        required: false
        default: ""
      start_time:
        description: "HH:MM (KST)"
        required: false
        default: "08:50"
      end_time:
        description: "HH:MM (KST)"
        required: false
        default: "15:40"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        env:
          BOARD_ID: "krstock"
          DATES_FILE: "date.txt"
          TARGET_DATE: ${{ inputs.target_date }}
          START_TIME: ${{ inputs.start_time }}
          END_TIME: ${{ inputs.end_time }}
          LIST_NUM: "100"
          SLEEP_LIST: "0.7"
          SLEEP_POST: "0.5"
          MAX_RETRIES: "5"
          PAGE_EDGE_BAND: "12"
          START_PAGE_VERIFY_RADIUS: "120"
          ZERO_RESULT_FALLBACK_RADIUS: "140"
          BAND_MISS_LIMIT: "3"
          BAND_EXPAND_MAX_PAGES: "800"
          MIN_VALID_LIST_ROWS: "15"
          PAGE_FETCH_RETRIES: "3"
        run: |
          python main.py
          ls -al outputs || true

      - name: Upload CSV artifacts
        uses: actions/upload-artifact@v4
        with:
          name: krstock_csv_outputs
          path: outputs/
