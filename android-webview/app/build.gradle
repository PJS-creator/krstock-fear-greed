plugins {
    id "com.android.application"
}

android {
    namespace "com.pjscreator.jisungport"
    compileSdk 35

    defaultConfig {
        applicationId "com.pjscreator.jisungport"
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName "0.1.0-debug"
        buildConfigField "String", "WEBVIEW_URL", "\"https://jisungport.streamlit.app\""
    }

    buildFeatures {
        buildConfig true
    }
}
